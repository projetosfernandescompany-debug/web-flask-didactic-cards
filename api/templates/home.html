<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartões Didáticos</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
</head>
<body>

  <div class="page">

    <header class="hero">
      <div class="hero-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="3"/>
          <line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
      </div>
      <h1>Cartões Didáticos</h1>
      <p class="subtitle">Escolha um deck para começar a estudar</p>
    </header>

    <main class="deck-grid">
      {% for x in pages %}
      <a href="/{{ x.replace('.csv', '').replace(' ', '-').lower() }}" class="deck-card">
        <div class="deck-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="6" width="18" height="13" rx="2"/>
            <path d="M3 10h18"/>
            <path d="M7 3l-2 3M17 3l2 3"/>
          </svg>
        </div>
        <span class="deck-name">{{ x.replace('.csv', '') }}</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
      {% endfor %}
    </main>

  </div>

  <script src="{{ url_for('static', filename='js/home.js') }}"></script>
</body>
</html>
