<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartão Didático</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <div class="topbar">
    <a href="/" class="btn-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Início
    </a>
  </div>

  <div class="app">

    {% if quest %}
    <div class="progress-info" id="progress-info">Cartão 1 de {{ quest | length }}</div>

    <div class="card-container">
      <div class="card" onclick="flipCard(this)">
        <div class="card-face front" id="front">
          <span class="card-text">{{ quest[0][0] }}</span>
        </div>
        <div class="card-face back" id="back">
          <span class="card-text">{{ quest[0][1] }}</span>
        </div>
      </div>
    </div>
    {% endif %}

    <button id="next-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
      Próximo
    </button>

  </div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  <script id="data-script">
    const questData = {{ quest | tojson }};
  </script>
</body>
</html>
